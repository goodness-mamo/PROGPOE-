name: Build CyberSecurity Chatbot

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Project
        run: dotnet restore PROGPARTPOE.csproj

      - name: Build Project
        run: dotnet build PROGPARTPOE.csproj --configuration Release --no-restore

      - name: Publish Project
        run: dotnet publish PROGPARTPOE.csproj --configuration Release --output publish

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: CyberSecurityChatbot
          path: publish
